name: 지원사업 공고 자동 수집

on:
  schedule:
    # UTC 23:00 = 한국시간 오전 8:00
    - cron: '0 23 * * *'
  workflow_dispatch:   # GitHub 화면에서 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 공고 수집 실행
        run: python main.py
        env:
          NOTION_API_KEY: ${{ secrets.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 }}
          NOTION_DATABASE_ID: 09ad73bb5325838993ab01b32bc76f9e
          BIZINFO_API_KEY: ${{ secrets.wKJ7t3 }}
