name: notice-collector

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "40 23 * * *"
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: 09ad73bb5325838993ab01b32bc76f9e
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
